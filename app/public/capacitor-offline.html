<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اتصال برقرار نیست</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #134e4a;
        padding: 24px;
        text-align: center;
      }

      main {
        max-width: 24rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
        font-weight: 700;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>اتصال اینترنت برقرار نیست</h1>
      <p>برای استفاده از نمایشگاه مجازی مبلمان، لطفاً اتصال اینترنت خود را بررسی کنید و دوباره تلاش کنید.</p>
    </main>
  </body>
</html>
