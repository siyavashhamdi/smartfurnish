# Nginx site config for smartfurnish.neginheal.ir (staging on neginheal server)
# Install:
#   sudo cp deploy/nginx/smartfurnish.neginheal.ir.conf /etc/nginx/sites-available/smartfurnish.neginheal.ir
#   sudo ln -sf /etc/nginx/sites-available/smartfurnish.neginheal.ir /etc/nginx/sites-enabled/smartfurnish.neginheal.ir
#   sudo nginx -t && sudo systemctl reload nginx
# SSL (after HTTP works):
#   sudo certbot --nginx -d smartfurnish.neginheal.ir

upstream smart_furnish_app {
    server 127.0.0.1:5800;
}

upstream smart_furnish_api {
    server 127.0.0.1:5801;
}

server {
    listen 80;
    listen [::]:80;
    server_name smartfurnish.neginheal.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /graphql {
        proxy_pass http://smart_furnish_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://smart_furnish_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://smart_furnish_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartfurnish.neginheal.ir;

    ssl_certificate /etc/letsencrypt/live/smartfurnish.neginheal.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartfurnish.neginheal.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 75M;

    location /graphql {
        proxy_pass http://smart_furnish_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://smart_furnish_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://smart_furnish_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
