# Nginx site config for smartfurnish.ir
# Install:
#   sudo cp deploy/nginx/smartfurnish.ir.conf /etc/nginx/sites-available/smartfurnish.ir
#   sudo ln -sf /etc/nginx/sites-available/smartfurnish.ir /etc/nginx/sites-enabled/smartfurnish.ir
#   sudo nginx -t && sudo systemctl reload nginx

upstream smart_furnish_app {
    server 127.0.0.1:5800;
}

upstream smart_furnish_api {
    server 127.0.0.1:5801;
}

server {
    listen 80;
    listen [::]:80;
    server_name smartfurnish.ir www.smartfurnish.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartfurnish.ir www.smartfurnish.ir;

    # Replace with your Let's Encrypt paths after running certbot.
    ssl_certificate /etc/letsencrypt/live/smartfurnish.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartfurnish.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 75M;

    location /graphql {
        proxy_pass http://smart_furnish_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://smart_furnish_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://smart_furnish_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
