name: Build API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/build-api.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "api/**"
      - ".github/workflows/build-api.yml"

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build API
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: api/dist
          retention-days: 7
